{% extends 'base.html' %}

{% block title %}Удалить объявление{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-5">
            <div class="card-body text-center">
                <h3 class="card-title mb-2">Удалить объявление</h3>
                <p class="text-muted mb-1">Вы уверены что хотите удалить объявление:</p>
                <p class="fw-bold mb-4">«{{ object.title }}»</p>
                <p class="text-danger mb-4">Это действие нельзя отменить.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a href="{% url 'bulletin_list' %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
