{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card mt-5">
            <div class="card-body">
                <h3 class="card-title text-center mb-2">Вход</h3>
                <p class="text-muted text-center mb-4">Введите почту и пароль чтобы войти</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-primary">Войти</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'register' %}">Нет аккаунта? Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
